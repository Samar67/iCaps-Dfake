data_dir: "data path"
resume_dir: "path to model"
mode: "test"
epochs: 1
image_size: 224
batch_size: 32  
num_workers: 8
cudnn:
  benchmark: true
  deterministic: false
  enabled: true
HRNet: 
  extra:
    with_head: true
    stage1:
      num_modules: 1
      num_ranches: 1
      block: BOTTLENECK
      num_blocks:
        - 1
      num_channels:
        - 32
      fuse_method: SUM
    stage2:
      num_modules: 1
      num_branches: 2
      block: BASIC
      num_blocks:
        - 2
        - 2
      num_channels:
        - 16
        - 32
      fuse_method: SUM
    stage3:
      num_modules: 1
      num_branches: 3
      block: BASIC
      num_blocks:
        - 2
        - 2
        - 2
      num_channels:
        - 16
        - 32
        - 64
      fuse_method: SUM
    stage4:
      num_modules: 1
      num_branches: 4
      block: BASIC
      num_blocks:
        - 2
        - 2
        - 2
        - 2
      num_channels:
        - 16
        - 32
        - 64
        - 128
      fuse_method: SUM
CapsNet:
  num_routing: 2
  seq_routing: false
  dp: 0.5 
  extra:
    primary_capsules:
      kernel_size: 1
      stride: 1
      input_dim: 518
      caps_dim: 16
      num_caps: 32
      padding: 0
      out_img_size: 14
    capsules:
      - type: "CONV"
        num_caps: 32
        caps_dim: 16
        kernel_size: 3
        stride: 2
        matrix_pose: true
        out_img_size": 6
      - type: "CONV"
        num_caps: 32
        caps_dim: 16
        kernel_size: 3
        stride: 1
        matrix_pose: true
        out_img_size: 4
    class_capsules:
      num_caps: 2
      caps_dim: 16
      matrix_pose: true
train:
  lr_factor: 0.1
  lr_step:
    - 30
    - 60
    - 90
  lr: 0.001
  wd: 0.0001
  momentum: 0.9
  nesterov: true 